<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subwoofer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       ONBOARDING MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="onboarding-overlay" class="overlay-bg">
    <div class="ob-modal" id="ob-modal">

      <div class="ob-header">
        <img src="logo.png" alt="Subwoofer" class="ob-logo"
             onerror="this.style.display='none'">
        <div class="ob-headline">Let's get your game ready</div>
        <div class="ob-subline">We'll collect the essentials once — then you focus on each platform.</div>
      </div>

      <div class="ob-tabs" id="ob-tabs">
        <button class="ob-tab" onclick="setOnboardingTab(0)"><span class="ob-tab-num">1</span>Game Details</button>
        <button class="ob-tab" onclick="setOnboardingTab(1)"><span class="ob-tab-num">2</span>Upload Assets</button>
        <button class="ob-tab" onclick="setOnboardingTab(2)"><span class="ob-tab-num">3</span>Compliance</button>
      </div>

      <div class="ob-body" id="ob-body">
        <!-- Rendered by renderOnboardingBody() -->
      </div>

      <div class="ob-footer" id="ob-footer">
        <!-- Rendered by renderOnboardingFooter() -->
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TASK MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="task-overlay" class="overlay-bg hidden" onclick="taskOverlayClick(event)">
    <div class="task-modal" id="task-modal">
      <!-- Rendered by renderTaskModal() -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SUBMIT / CONTENT REVIEW MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="submit-overlay" class="overlay-bg hidden" onclick="submitOverlayClick(event)">
    <div class="submit-modal" id="submit-modal">
      <!-- Rendered by renderSubmitModal() -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       CONFIRM / INFO MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="confirm-overlay" class="overlay-bg hidden">
    <div class="confirm-modal" id="confirm-modal">
      <div class="confirm-modal-title" id="confirm-modal-title">Are you sure?</div>
      <div class="confirm-modal-message" id="confirm-modal-message"></div>
      <div class="confirm-modal-footer">
        <button class="btn btn-ghost" id="confirm-modal-cancel" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn btn-primary" id="confirm-modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TOPBAR — always visible (sits above onboarding overlay)
  ═══════════════════════════════════════════════════ -->
  <header class="topbar" id="topbar">
    <div class="logo">
      <img src="logo.png" alt="Subwoofer" class="topbar-logo"
           onerror="this.style.display='none'; document.getElementById('topbar-logo-fallback').style.display='flex'">
      <span id="topbar-logo-fallback" style="display:none;align-items:center;gap:8px;">
        <svg class="logo-grid" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="#3a3a3a">
            <rect x="20" y="0" width="6" height="6" rx="1.5"/><rect x="30" y="0" width="6" height="6" rx="1.5"/><rect x="40" y="0" width="6" height="6" rx="1.5"/><rect x="50" y="0" width="6" height="6" rx="1.5"/>
            <rect x="10" y="10" width="6" height="6" rx="1.5"/><rect x="20" y="10" width="6" height="6" rx="1.5"/><rect x="30" y="10" width="6" height="6" rx="1.5"/><rect x="40" y="10" width="6" height="6" rx="1.5"/><rect x="50" y="10" width="6" height="6" rx="1.5"/><rect x="60" y="10" width="6" height="6" rx="1.5"/>
            <rect x="0" y="20" width="6" height="6" rx="1.5"/><rect x="10" y="20" width="6" height="6" rx="1.5"/><rect x="20" y="20" width="6" height="6" rx="1.5"/><rect x="50" y="20" width="6" height="6" rx="1.5"/><rect x="60" y="20" width="6" height="6" rx="1.5"/><rect x="70" y="20" width="6" height="6" rx="1.5"/>
            <rect x="0" y="30" width="6" height="6" rx="1.5"/><rect x="10" y="30" width="6" height="6" rx="1.5"/><rect x="60" y="30" width="6" height="6" rx="1.5"/><rect x="70" y="30" width="6" height="6" rx="1.5"/>
            <rect x="0" y="40" width="6" height="6" rx="1.5"/><rect x="10" y="40" width="6" height="6" rx="1.5"/><rect x="60" y="40" width="6" height="6" rx="1.5"/><rect x="70" y="40" width="6" height="6" rx="1.5"/>
            <rect x="0" y="50" width="6" height="6" rx="1.5"/><rect x="10" y="50" width="6" height="6" rx="1.5"/><rect x="20" y="50" width="6" height="6" rx="1.5"/><rect x="50" y="50" width="6" height="6" rx="1.5"/><rect x="60" y="50" width="6" height="6" rx="1.5"/><rect x="70" y="50" width="6" height="6" rx="1.5"/>
            <rect x="10" y="60" width="6" height="6" rx="1.5"/><rect x="20" y="60" width="6" height="6" rx="1.5"/><rect x="30" y="60" width="6" height="6" rx="1.5"/><rect x="40" y="60" width="6" height="6" rx="1.5"/><rect x="50" y="60" width="6" height="6" rx="1.5"/><rect x="60" y="60" width="6" height="6" rx="1.5"/>
            <rect x="20" y="70" width="6" height="6" rx="1.5"/><rect x="30" y="70" width="6" height="6" rx="1.5"/><rect x="40" y="70" width="6" height="6" rx="1.5"/><rect x="50" y="70" width="6" height="6" rx="1.5"/>
          </g>
          <g fill="#e8e8ea">
            <rect x="30" y="20" width="6" height="6" rx="1.5"/><rect x="40" y="20" width="6" height="6" rx="1.5"/>
            <rect x="20" y="30" width="6" height="6" rx="1.5"/><rect x="50" y="30" width="6" height="6" rx="1.5"/>
            <rect x="20" y="40" width="6" height="6" rx="1.5"/><rect x="50" y="40" width="6" height="6" rx="1.5"/>
            <rect x="30" y="50" width="6" height="6" rx="1.5"/><rect x="40" y="50" width="6" height="6" rx="1.5"/>
          </g>
        </svg>
        <span>Subwoofer</span>
      </span>
    </div>
    <div class="profile-wrap" id="profileWrap">
      <button class="profile-block" onclick="toggleProfileMenu(event)" aria-label="Profile menu">
        <div class="profile-avatar"></div>
        <span class="profile-name" id="profile-name">Developer</span>
      </button>
      <div class="profile-menu" id="profileMenu">
        <button class="profile-menu-item" id="profile-menu-signin"
                onclick="closeAllDropdowns(); if(!state.onboardingComplete) completeOnboarding()">Sign in</button>
        <button class="profile-menu-item" onclick="closeAllDropdowns()">Profile settings</button>
        <button class="profile-menu-item danger" onclick="closeAllDropdowns()">Sign out</button>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════════════════ -->
  <div id="main-app" class="hidden">

    <div class="project-bar" id="project-bar">
      <div class="bar-left">
        <div class="project-selector-wrap" id="projectSelectorWrap">
          <button class="project-selector" id="projectSelector" onclick="toggleProjectDropdown(event)">
            <span class="title" id="projectSelectorTitle">My Game</span>
            <span class="chev">⌄</span>
          </button>
          <div class="project-dropdown" id="projectDropdown">
            <!-- Rendered by renderProjectBar() -->
          </div>
        </div>
        <button class="icon-btn" onclick="openOnboarding(0)" aria-label="Edit game details" title="Edit game details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
      <div class="bar-right">
        <div class="submission-selector-wrap" id="submissionSelectorWrap">
          <button class="submission-selector" id="submissionSelector" onclick="toggleSubmissionDropdown(event)">
            <span class="title" id="submissionSelectorTitle">Submission 1.0</span>
            <span class="chev">⌄</span>
          </button>
          <div class="submission-dropdown" id="submissionDropdown">
            <!-- Rendered by renderProjectBar() -->
          </div>
        </div>
        <div class="submission-menu-wrap" id="submissionMenuWrap">
          <button class="icon-btn" onclick="toggleSubmissionMenu(event)" aria-label="Submission options" title="Submission options">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>
            </svg>
          </button>
          <div class="submission-menu" id="submissionMenu">
            <button class="submission-menu-item danger" onclick="deleteCurrentSubmission()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              <span>Delete submission</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="dashboard" id="dashboard">
        <!-- Rendered by renderDashboard() -->
      </div>
    </main>

  </div>

  <!-- Global fixed tooltip (bypasses overflow/z-index clipping) -->
  <div id="g-tip" class="g-tip"></div>

  <script src="state.js"></script>
  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
