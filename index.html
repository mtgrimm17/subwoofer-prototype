<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subwoofer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       ONBOARDING MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="onboarding-overlay" class="overlay-bg">
    <div class="ob-modal" id="ob-modal">

      <div class="ob-header">
        <img src="logo.png" alt="Subwoofer" class="ob-logo"
             onerror="this.style.display='none'">
        <div class="ob-headline">Let's get your game ready</div>
        <div class="ob-subline">We'll collect the essentials once — then you focus on each platform.</div>
      </div>

      <div class="ob-tabs" id="ob-tabs">
        <button class="ob-tab" onclick="setOnboardingTab(0)">Game Details</button>
        <button class="ob-tab" onclick="setOnboardingTab(1)">Upload Assets</button>
        <button class="ob-tab" onclick="setOnboardingTab(2)">Compliance</button>
      </div>

      <div class="ob-body" id="ob-body">
        <!-- Rendered by renderOnboardingBody() -->
      </div>

      <div class="ob-footer" id="ob-footer">
        <!-- Rendered by renderOnboardingFooter() -->
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TASK MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="task-overlay" class="overlay-bg hidden" onclick="taskOverlayClick(event)">
    <div class="task-modal" id="task-modal">
      <!-- Rendered by renderTaskModal() -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SUBMIT / CONTENT REVIEW MODAL
  ═══════════════════════════════════════════════════ -->
  <div id="submit-overlay" class="overlay-bg hidden" onclick="submitOverlayClick(event)">
    <div class="submit-modal" id="submit-modal">
      <!-- Rendered by renderSubmitModal() -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════════════════ -->
  <div id="main-app" class="hidden">

    <header class="app-header">
      <div class="app-header-left">
        <img src="logo.png" alt="Subwoofer" class="app-logo"
             onerror="this.style.display='none'">
        <div class="app-game-name" id="app-game-name">—</div>
      </div>
      <div class="app-header-right">
        <button class="btn btn-ghost btn-sm" onclick="openOnboarding(0)">Game Details</button>
      </div>
    </header>

    <div class="dashboard" id="dashboard">
      <!-- Rendered by renderDashboard() -->
    </div>

  </div>

  <script src="state.js"></script>
  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
